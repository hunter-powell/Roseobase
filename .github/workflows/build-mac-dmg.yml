name: Build macOS DMG

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'electron/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - '.github/workflows/build-mac-dmg.yml'

jobs:
  build-dmg:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download BLAST+ binaries (macOS)
        run: bash blast-bin/download-blast.sh

      - name: Build frontend
        run: npm run build

      - name: Package unsigned DMG
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --mac --publish never

      - name: List release output
        run: ls -lah release/

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Roseobase-mac-dmg
          path: release/*.dmg
          if-no-files-found: error
